name: Smoke test against evmcp

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  evmcp-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout action
        uses: actions/checkout@v6

      - name: Checkout evmcp
        uses: actions/checkout@v6
        with:
          repository: psiinon/evmcp
          path: evmcp

      - name: Build evmcp image
        run: docker build -t evmcp ./evmcp

      - name: Start evmcp
        run: docker run -d --rm -p 8000:8000 --name evmcp evmcp

      - name: Wait for evmcp
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/mcp \
                 -H 'Content-Type: application/json' -H 'Accept: application/json' \
                 -d '{"jsonrpc":"2.0","method":"tools/list","params":{},"id":1}' > /dev/null; then
              echo "evmcp is ready"; exit 0
            fi
            sleep 1
          done
          echo "evmcp did not become ready in time"; exit 1

      - name: Run ZAP MCP Scan
        uses: ./
        with:
          target: 'http://localhost:8000/mcp'
          docker_name: 'ghcr.io/zaproxy/zaproxy:nightly'
          allow_issue_writing: false

      - name: Stop evmcp
        if: always()
        run: docker stop evmcp || true
